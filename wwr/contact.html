<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="A summary webpage including a call to action; Contact US.">
    <meta name="author" content="Isaka Fodei">
    <title>Contact Dry Oar Rafting Co. for white water adventures in Kolob, CA. Use our form to book trips, ask
    questions, or join our newsletter. Get in touch!.</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/z-wwr-blue.jpg" alt="rafting company logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
        <h1>White Water Rafting Company</h1>
        <p>123 Main River Street<br>Kolob, California<br>+1 999 999 9999<br>info@whitewater.com</p>

    </header>
    <main>
        <div class="map-placeholder">
            <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d255282.32390058297!2d36.6825788659323!3d-1.3032035598867184!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x182f1172d84d49a7%3A0xf7cf0254b297924c!2sNairobi!5e0!3m2!1sen!2ske!4v1775222426638!5m2!1sen!2ske" allowfullscreen="" loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
        <form class="contact-form">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="John Doe">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="john.doe@example.com">
            </div>
            <fieldset>
                <legend>Message Purpose</legend>
                <label><input type="radio" name="purpose" checked> General Inquiry</label>
                <label><input type="radio" name="purpose"> Reservation Question</label>
                <label><input type="radio" name="purpose"> Website Suggestion</label>
            </fieldset>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" placeholder="Type here"></textarea>
            </div>
            
            <label class="checkbox">
                <input type="checkbox"> Please Subscribe me to the monthly newsletter
            </label>
            
            <button type="submit">Get in Touch!</button>
        </form>
        <div class="hero">
            <img src="images/background-image.jpg" alt="people in a boat">
            <h1>Dry Oar Rafting Co.</h1>
        </div>
        <section class="adventure">
            <h2>Adventure Awaits You!</h2>
            <figure>
                <img src="images/idaho.jpeg" alt="Idaho Falls">
                <figcaption>Idaho Falls.</figcaption>
            </figure>
            <figure>
                <img src="images/illinois.jpeg" alt="Illinois Falls">
                <figcaption>Illinois Falls.</figcaption>
            </figure>
            <figure>
                <img src="images/port-harcourt.jpg" alt="Port Harcourt Falls">
                <figcaption>Port Harcourt Falls.</figcaption>
            </figure>
            <figure>
                <img src="images/port-victoria.jpg" alt="Victoria Falls">
                <figcaption>Victoria Falls.</figcaption>
            </figure>
            <figure>
                <img src="images/great-accra.jpeg" alt="Great Accra">
                <figcaption>Great Accra Falls.</figcaption>
            </figure>
        </section>
    </main>
    <aside class="employee-section">
        <h2>We Are Here to Serve You</h2>
        <div class="profile-grid">
        
            <!-- Profile 1 -->
            <div class="profile">
                <img src="images/happy.jpeg" alt="Profile of John Doe, Guide" class="profile-img">
                <p>John Doe</p>
            </div>
            <!-- Profile 2 -->
            <div class="profile">
            <img src="images/IMG-20251202-WA0005.jpg" alt="Profile of Jane Smith, Manager" class="profile-img">
            <p>Jane Smith</p>
            </div>
            <!-- Profile 3 -->
            <div class="profile">
            <img src="images/IMG-20251202-WA0006.jpg" alt="Profile of Sam Wilson, Instructor" class="profile-img">
            <p>Sam Wilson</p>
            </div>
        </div>
    </aside>
    <footer>
        <p>&copy; 2026 Dry Oar Rafting Co. | Isaka Fodei</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/icons8-facebook-50.png" alt="Facebook icon">
            </a>
            <a href="https://twitter.com">
                <img src="images/icons8-twitter-50.png" alt="Twitter icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/icons8-instagram-logo-50.png" alt="Instagram icon">
            </a>
        </nav>
    </footer>
</body>

</html>
