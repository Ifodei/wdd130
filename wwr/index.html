<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dry Oar Boating | Home</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <!-- Added a class for easier styling -->
        <img src="images/z-wwr-blue.jpg" alt="rafting company logo" class="logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <div class="hero">
            <img src="images/illinois.jpeg" alt="Rafting on a wild river" class="hero-img">
            <section class="hero-msg">
                <h1 class="home-title">Adventure Awaits!</h1>
                <!-- Moved the CTA button inside the hero-msg for positioning -->
                <div class="button-box">
                    <a class="book" href="trips.html">Book Now</a>
                </div>
            </section>
        </div>

        <!-- Changed to match your "Adventure" CSS -->
        <section class="adventure">
            <h2>Explore Our World</h2>
            <figure>
                <img src="images/image.jpg" alt="Narrow river canyon">
                <figcaption>Explore the Unexplored</figcaption>
            </figure>
            <figure>
                <img src="images/tents-night-river.jpg" alt="Tents by the river">
                <figcaption>Multi-Day Expeditions</figcaption>
            </figure>
            <!-- You can add 3 more figures here to fill your 5-column grid -->
        </section>

        <section class="newsletter">
            <h2>Join Our Newsletter</h2>
            <!-- Added .contact-form class to match your CSS -->
            <form action="#" method="post" class="contact-form">
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="user_name" placeholder="Full Name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="user_email" placeholder="Email Address"
                      required>
                </div>
                <button type="submit">Subscribe</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Dry Oar Rafting Co. | Isaka Fodei</p>
        <nav class="socialmedia">
            <a href="https://facebook.com"><img src="images/icons8-facebook-50.png" alt="FB"></a>
            <a href="https://twitter.com"><img src="images/icons8-twitter-50.png" alt="Twitter"></a>
            <a href="https://instagram.com"><img src="images/icons8-instagram-logo-50.png"
                  alt="IG"></a>
        </nav>
    </footer>
</body>

</html>
